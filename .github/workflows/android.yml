name: Build Android APK (provisional)

# Builds an unsigned DEBUG APK of the WebView app on GitHub's runners (which have
# JDK + Android SDK), so we can ship a provisional build without a local Android
# toolchain. The debug APK is sideloadable. A signed release APK is a later step.
on:
  push:
    branches: [android-webview-app, main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lapclip-visualizer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
